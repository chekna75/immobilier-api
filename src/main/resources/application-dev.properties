# Configuration de développement
# Copiez ces valeurs dans vos variables d'environnement

# Base de données
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/immobilier_db

# AWS S3 (remplacez par vos vraies clés)
aws.s3.region=eu-north-1
aws.s3.bucket=app-immo
aws.s3.access-key=${AWS_ACCESS_KEY_ID}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}

# SMTP
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.username=your-email@gmail.com
quarkus.mailer.password=your-app-password
quarkus.mailer.ssl=false

# SMS
app.sms.apiKey=your-sms-api-key
